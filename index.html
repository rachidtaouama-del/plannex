  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is PlanneX and what does it do?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "PlanneX is an AI-powered SaaS platform for industrial shutdown and turnaround planning. It automates task sequencing, critical path analysis, Gantt scheduling, SIMOPS management, scaffold readiness tracking, permit-to-work workflows, and cost hub management — replacing MS Project and Primavera P6 for plant shutdowns."
        }
      },
      {
        "@type": "Question",
        "name": "How does PlanneX compare to Primavera P6 or Microsoft Project?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Unlike Primavera P6 and Microsoft Project, PlanneX is purpose-built for industrial shutdowns. It features an embedded AI co-pilot that optimizes task sequences in seconds, real-time critical path highlighting, live slippage prediction, and integrated modules for SIMOPS, scaffolding, permits, and spare parts — all in a modern, intuitive interface that requires no specialist training."
        }
      },
      {
        "@type": "Question",
        "name": "What industries does PlanneX serve?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "PlanneX serves heavy industry sectors including refineries, petrochemical plants, power generation facilities, chemical plants, and large-scale manufacturing facilities that perform periodic maintenance shutdowns and turnarounds."
        }
      },
      {
        "@type": "Question",
        "name": "Does PlanneX support SIMOPS management?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. PlanneX includes a dedicated SIMOPS (Simultaneous Operations) module that tracks concurrent high-risk operations, their involved tasks, and safety coordination requirements — all linked to your master shutdown schedule."
        }
      },
      {
        "@type": "Question",
        "name": "Can I import my existing Excel planning data into PlanneX?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. PlanneX accepts Excel (.xlsx) file uploads containing your task list, resource data, and scheduling parameters. The AI engine parses the data and generates an optimized Gantt schedule automatically, eliminating hours of manual entry."
        }
      },
      {
        "@type": "Question",
        "name": "What is the critical path and how does PlanneX handle it?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The critical path is the longest chain of dependent tasks with zero scheduling slack — any delay on it directly delays the final shutdown end date. PlanneX permanently highlights the critical path in its live Gantt chart and sends instant alerts when a critical task deviates, giving managers maximum reaction time to reallocate resources."
        }
      },
      {
        "@type": "Question",
        "name": "Does PlanneX offer permit-to-work (PTW) management?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. The PlanneX Permit Hub manages all types of work permits (levage, travail en hauteur, feu, pénétration, excavation), tracks their readiness status, and links them directly to scheduled tasks — providing a complete pre-work authorization picture."
        }
      },
      {
        "@type": "Question",
        "name": "How does PlanneX predict schedule slippage?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "PlanneX uses real-time field telemetry (actual task start/end times) to calculate a live 'Potentiel Glissement' (slippage potential) metric. Instead of vague percentage estimates, it delivers a mathematically precise remaining-hours figure, enabling proactive intervention before deviations become critical failures."
        }
      }
    ]
  }
